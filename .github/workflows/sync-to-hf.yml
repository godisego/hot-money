name: Sync to HF Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install -U "huggingface_hub>=0.24"

      - name: Upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os, sys
          from huggingface_hub import HfApi
          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          # verify token
          try:
              who = api.whoami()
              print(f"Authenticated as: {who.get('name')}")
          except Exception as e:
              print(f"Token invalid: {e}"); sys.exit(1)
          # upload
          api.upload_folder(
              folder_path=".",
              repo_id="chikongmuzhi/hot-money",
              repo_type="space",
              commit_message="sync from github",
              ignore_patterns=[
                  ".git/**", ".github/**",
                  "skills/deep-analysis/scripts/reports/**",
                  "skills/deep-analysis/scripts/.cache/**",
                  "**/__pycache__/**", "**/*.pyc",
              ],
          )
          print("✓ synced")
          PY
